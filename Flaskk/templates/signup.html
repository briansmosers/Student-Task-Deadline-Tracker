<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Tracker - Sign Up</title>
    
    <style>
        body {
            /* Using the same background for consistency */
            background-image: url("{{ url_for('static', filename='background.jpg') }}"); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .signup-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="signup-card p-4 shadow-lg">
            <h2 class="text-center mb-4">Create Account</h2>
            
            <form action="/signup" method="POST">
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" placeholder="e.g. 20" required>
    </div>

    <div class="mb-3">
        <label class="form-label">University</label>
        <select name="university" class="form-select" required>
            <option value="" selected disabled>Select your University</option>
            <option value="UiTM">UiTM</option>
            <option value="UM">University of Malaya</option>
            <option value="MMU">Multimedia University</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="example@student.com" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create password" required>
    </div>
    
    <button type="submit" class="btn btn-success w-100 shadow-sm">Create Student Account</button>
</form>
            
            <p class="text-center mt-3 mb-0">
                Already have an account? <a href="/login" class="text-decoration-none">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
