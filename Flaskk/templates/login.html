<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Tracker - Login</title>
    
    <style>
    body {
        /* Ensure there are no extra spaces and the filename matches your folder */
        background-image: url("{{ url_for('static', filename='backround.jpg') }}"); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        height: 100vh;
        margin: 0;
    }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="login-card p-4 shadow-lg">
            <h2 class="text-center mb-4">Student Login</h2>
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 shadow-sm">Login</button>
            </form>
            
            <p class="text-center mt-3 mb-0">
                New? <a href="/signup" class="text-decoration-none">Sign up here</a>
            </p>
        </div>
    </div>

</body>
</html>
